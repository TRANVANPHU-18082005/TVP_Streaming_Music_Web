# fly.toml app configuration file generated for tvp-backend on 2026-05-11T00:29:57+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tvp-backend'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "get"
  path = "/api/health"
  timeout = "5s"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024